<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ViT Head Explorer ã attention-only, MNIST 0/1/2</title>
<script src="plotly-2.35.2.min.js"></script>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --panel2:#1c232d; --line:#2a3441;
    --txt:#e6edf3; --dim:#8b97a5; --accent:#58a6ff;
    --c0:#e6194B; --c1:#3cb44b; --c2:#4363d8;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
       font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{padding:10px 16px;border-bottom:1px solid var(--line);display:flex;
         align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:15px;margin:0;font-weight:600}
  header .sub{color:var(--dim);font-size:12px}
  select,button{background:var(--panel2);color:var(--txt);border:1px solid var(--line);
                border-radius:6px;padding:5px 9px;font-size:13px;cursor:pointer}
  button:hover{border-color:var(--accent)}
  button:disabled{opacity:.4;cursor:default}
  .grid{display:grid;grid-template-columns:300px 1fr;grid-template-rows:auto 1fr;
        gap:12px;padding:12px;height:calc(100vh - 52px)}
  .top{grid-column:1 / 3;display:flex;gap:16px;align-items:center;
       background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px}
  .left{background:var(--panel);border:1px solid var(--line);border-radius:10px;
        padding:10px;overflow:auto}
  .right{background:var(--panel);border:1px solid var(--line);border-radius:10px;position:relative;min-height:0}
  #plot{width:100%;height:100%}
  canvas{image-rendering:pixelated;border-radius:8px;border:1px solid var(--line)}
  .imgwrap{display:flex;gap:14px;align-items:center}
  .stepinfo{min-width:220px}
  .stepinfo .lbl{font-size:13px;color:var(--dim)}
  .stepinfo .cur{font-size:17px;font-weight:600;margin-top:2px}
  .probs{display:flex;gap:8px;align-items:flex-end;height:52px;margin-top:6px}
  .pbar{width:34px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
  .pbar .bar{width:26px;border-radius:4px 4px 0 0;transition:height .25s}
  .pbar .cap{font-size:11px;color:var(--dim);margin-top:3px}
  .ctrls{display:flex;gap:8px;align-items:center;margin-left:auto}
  .blk{border:1px solid var(--line);border-radius:9px;margin-bottom:9px;overflow:hidden}
  .blk h3{margin:0;font-size:12px;padding:6px 9px;background:var(--panel2);
          display:flex;align-items:center;justify-content:space-between}
  .blk h3 .toggle{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:5px;cursor:pointer}
  .heads{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px}
  .cell{border:2px solid transparent;border-radius:7px;padding:8px 4px;text-align:center;
        cursor:pointer;font-size:12px;font-weight:600;color:#0e1116;position:relative}
  .cell small{display:block;font-weight:400;font-size:9px;opacity:.8}
  .cell.off{background:#39424e !important;color:var(--dim);text-decoration:line-through}
  .cell.active{border-color:#fff;box-shadow:0 0 10px rgba(255,255,255,.5)}
  .node{font-size:11px;color:var(--dim);text-align:center;padding:3px}
  .node.active{color:#fff;font-weight:600}
  .flow{text-align:center;color:var(--line);font-size:14px;line-height:1}
  .hint{color:var(--dim);font-size:11px;margin-top:4px}
  .legend{display:flex;gap:12px;font-size:11px;color:var(--dim);align-items:center}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:-1px}
</style>
</head>
<body>
<header>
  <h1>ViT Head Explorer</h1>
  <span class="sub">attention-only model ôñ MNIST 0/1/2 ôñ watch the CLS token move after each head &amp; block</span>
  <label style="margin-left:8px">example&nbsp;
    <select id="exSel"></select>
  </label>
  <button id="resetOff">reset toggles</button>
  <div class="legend" style="margin-left:auto">
    <span><span class="dot" style="background:var(--c0)"></span>0</span>
    <span><span class="dot" style="background:var(--c1)"></span>1</span>
    <span><span class="dot" style="background:var(--c2)"></span>2</span>
    <span style="color:#888">large ã₤ = class target ôñ grey line = baseline (no toggles)</span>
  </div>
</header>

<div class="grid">
  <div class="top">
    <div class="imgwrap">
      <div>
        <canvas id="img" width="140" height="140"></canvas>
        <div class="hint" id="attnHint">input image</div>
      </div>
    </div>
    <div class="stepinfo">
      <div class="lbl">current step</div>
      <div class="cur" id="stepLabel">input</div>
      <div class="probs" id="probs"></div>
      <div class="hint" id="predHint"></div>
    </div>
    <div class="ctrls">
      <button id="back">ãç</button>
      <button id="play">ãÑ play</button>
      <button id="fwd">ãÑ</button>
      <label class="hint">speed <input id="speed" type="range" min="120" max="1200" value="550" style="vertical-align:middle"></label>
    </div>
  </div>

  <div class="left" id="encoder"></div>

  <div class="right"><div id="plot"></div></div>
</div>

<script src="he_data.js"></script>
<script src="he_forward.js"></script>
<script>
const CC = DATA.classColors;                       // ['#e6194B','#3cb44b','#4363d8']
const HEAD_COLORS = ["#f2c14e","#f78154","#5fa8d3","#b892ff"];
const H = DATA.cfg.heads, DEPTH = DATA.cfg.depth, GRID = DATA.cfg.grid, PATCH = DATA.cfg.patch;

const state = { ex:0, off:new Set(), step:0, playing:false, timer:null, res:null, ghost:null, bounds:null };

/* ---------- example picker ---------- */
const exSel = document.getElementById('exSel');
DATA.examples.forEach((e,i)=>{
  const o=document.createElement('option'); o.value=i; o.textContent=`#${i} ã digit ${e.label}`;
  exSel.appendChild(o);
});
exSel.onchange = ()=>{ state.ex=+exSel.value; recompute(true); };

/* ---------- encoder diagram ---------- */
function buildEncoder(){
  const el = document.getElementById('encoder');
  el.innerHTML = '';
  const inp = document.createElement('div');
  inp.className='node'; inp.id='node_input'; inp.textContent='ãÈ input ôñ patches + CLS + pos';
  el.appendChild(inp);
  el.insertAdjacentHTML('beforeend','<div class="flow">ã</div>');
  for(let b=0;b<DEPTH;b++){
    const blk=document.createElement('div'); blk.className='blk'; blk.id='blk_'+b;
    const off = state.off.has('b'+b);
    blk.innerHTML =
      `<h3>Block ${b+1}
         <label class="toggle"><input type="checkbox" data-blk="${b}" ${off?'':'checked'}> on</label>
       </h3>`;
    const heads=document.createElement('div'); heads.className='heads';
    for(let h=0;h<H;h++){
      const c=document.createElement('div');
      c.className='cell'; c.id=`cell_${b}_${h}`;
      c.style.background=HEAD_COLORS[h];
      c.innerHTML=`H${h}<small>attn</small>`;
      c.onclick=()=>{ toggleHead(b,h); };
      heads.appendChild(c);
    }
    blk.appendChild(heads);
    el.appendChild(blk);
    el.insertAdjacentHTML('beforeend','<div class="flow">ã</div>');
  }
  const out=document.createElement('div');
  out.className='node'; out.id='node_output'; out.textContent='ã classifier ã prediction';
  el.appendChild(out);
  el.querySelectorAll('input[data-blk]').forEach(cb=>{
    cb.onchange=()=>{ const b=+cb.dataset.blk; if(cb.checked) state.off.delete('b'+b); else state.off.add('b'+b); recompute(true); };
  });
  syncCellClasses();
}
function toggleHead(b,h){
  if(state.off.has('b'+b)) return;                 // block off: heads irrelevant
  const key='h'+b+'_'+h;
  if(state.off.has(key)) state.off.delete(key); else state.off.add(key);
  recompute(true);
}
function syncCellClasses(){
  for(let b=0;b<DEPTH;b++){
    const boff=state.off.has('b'+b);
    document.getElementById('blk_'+b).style.opacity = boff? .5 : 1;
    for(let h=0;h<H;h++){
      const c=document.getElementById(`cell_${b}_${h}`);
      c.classList.toggle('off', boff || state.off.has('h'+b+'_'+h));
    }
  }
}

/* ---------- compute ---------- */
function recompute(resetStep){
  state.res = HE.runForward(DATA, state.ex, state.off);
  state.ghost = state.off.size ? HE.runForward(DATA, state.ex, new Set()) : null;
  // bounds from all points + centroids
  const pts=[...state.res.nodes.map(n=>n.p), ...DATA.centroids.map(c=>c.p)];
  if(state.ghost) pts.push(...state.ghost.nodes.map(n=>n.p));
  const lo=[Infinity,Infinity,Infinity], hi=[-Infinity,-Infinity,-Infinity];
  pts.forEach(p=>p.forEach((v,i)=>{lo[i]=Math.min(lo[i],v);hi[i]=Math.max(hi[i],v);}));
  const pad=lo.map((v,i)=>(hi[i]-v)*0.08||1);
  state.bounds=[lo.map((v,i)=>v-pad[i]),hi.map((v,i)=>v+pad[i])];
  if(resetStep) state.step=0;
  state.step=Math.min(state.step, state.res.nodes.length-1);
  syncCellClasses();
  renderAll(true);
}

/* ---------- 3D plot ---------- */
function pathTrace(nodes, upto, opts){
  const s=nodes.slice(0,upto+1);
  return Object.assign({
    type:'scatter3d', mode:'lines+markers',
    x:s.map(n=>n.p[0]), y:s.map(n=>n.p[1]), z:s.map(n=>n.p[2]),
    hoverinfo:'text', text:s.map(n=>n.label)
  }, opts);
}
function render3D(fit){
  const nodes=state.res.nodes, step=state.step;
  const traces=[];
  // class target centroids
  DATA.centroids.forEach(c=>{
    traces.push({type:'scatter3d',mode:'markers+text',x:[c.p[0]],y:[c.p[1]],z:[c.p[2]],
      marker:{size:16,color:CC[c.label],opacity:.28},
      text:[' '+c.label],textfont:{size:18,color:CC[c.label]},textposition:'middle right',
      hoverinfo:'text',hovertext:['class '+c.label+' target']});
  });
  // baseline ghost
  if(state.ghost){
    const g=state.ghost.nodes;
    traces.push({type:'scatter3d',mode:'lines',x:g.map(n=>n.p[0]),y:g.map(n=>n.p[1]),z:g.map(n=>n.p[2]),
      line:{color:'#5b6672',width:3,dash:'dot'},hoverinfo:'skip',name:'baseline'});
  }
  // full active path (faint)
  traces.push(pathTrace(nodes,nodes.length-1,{line:{color:'#39424e',width:3},marker:{size:2,color:'#39424e'}}));
  // traveled path (bright), color markers per node type
  const s=nodes.slice(0,step+1);
  const mcol=s.map(n=> n.type==='head'?HEAD_COLORS[n.head]: n.type==='bias'?'#8b97a5': n.type==='blockoff'?'#39424e':'#e6edf3');
  traces.push({type:'scatter3d',mode:'lines+markers',x:s.map(n=>n.p[0]),y:s.map(n=>n.p[1]),z:s.map(n=>n.p[2]),
    line:{color:'#e6edf3',width:5},marker:{size:5,color:mcol},hoverinfo:'text',text:s.map(n=>n.label)});
  // current point
  const cur=nodes[step];
  traces.push({type:'scatter3d',mode:'markers',x:[cur.p[0]],y:[cur.p[1]],z:[cur.p[2]],
    marker:{size:11,color:'#fff',line:{color:'#000',width:1}},hoverinfo:'text',text:[cur.label]});
  const [lo,hi]=state.bounds;
  const layout={paper_bgcolor:'rgba(0,0,0,0)',showlegend:false,margin:{l:0,r:0,t:0,b:0},
    uirevision:'keep',
    scene:{aspectmode:'cube',
      xaxis:{range:[lo[0],hi[0]],title:'PC1',color:'#8b97a5',gridcolor:'#222b35',backgroundcolor:'rgba(0,0,0,0)',showbackground:true},
      yaxis:{range:[lo[1],hi[1]],title:'PC2',color:'#8b97a5',gridcolor:'#222b35',backgroundcolor:'rgba(0,0,0,0)',showbackground:true},
      zaxis:{range:[lo[2],hi[2]],title:'PC3',color:'#8b97a5',gridcolor:'#222b35',backgroundcolor:'rgba(0,0,0,0)',showbackground:true}}};
  Plotly.react('plot',traces,layout,{displayModeBar:false,responsive:true});
}

/* ---------- image + attention ---------- */
function jet(t){ // t in [0,1] -> rgb
  const r=Math.max(0,Math.min(1,1.5-Math.abs(4*t-3)));
  const g=Math.max(0,Math.min(1,1.5-Math.abs(4*t-2)));
  const b=Math.max(0,Math.min(1,1.5-Math.abs(4*t-1)));
  return [r*255|0,g*255|0,b*255|0];
}
function renderImage(){
  const cv=document.getElementById('img'), ctx=cv.getContext('2d');
  const S=cv.width/28;
  const px=DATA.examples[state.ex].px;
  ctx.clearRect(0,0,cv.width,cv.height);
  for(let y=0;y<28;y++)for(let x=0;x<28;x++){const v=px[y*28+x];ctx.fillStyle=`rgb(${v},${v},${v})`;ctx.fillRect(x*S,y*S,S,S);}
  const node=state.res.nodes[state.step];
  const hint=document.getElementById('attnHint');
  if(node.type==='head'){
    const a=state.res.attn[node.block+'_'+node.head];
    let mx=0,mi=0; a.forEach((v,i)=>{if(v>mx){mx=v;mi=i;}});
    for(let p=0;p<a.length;p++){
      const gr=(p/GRID|0), gc=p%GRID, t=a[p]/mx, [r,g,b]=jet(t);
      ctx.fillStyle=`rgba(${r},${g},${b},${0.15+0.5*t})`;
      ctx.fillRect(gc*PATCH*S,gr*PATCH*S,PATCH*S,PATCH*S);
    }
    // outline strongest patch
    const gr=(mi/GRID|0),gc=mi%GRID;
    ctx.strokeStyle='#fff';ctx.lineWidth=2;
    ctx.strokeRect(gc*PATCH*S+1,gr*PATCH*S+1,PATCH*S-2,PATCH*S-2);
    hint.textContent=`block ${node.block+1} ôñ head ${node.head}${node.disabled?' (off)':''} ã attends most to patch (${gr},${gc})`;
  } else if(node.type==='blockoff'){
    hint.textContent=`block ${node.block+1} skipped ã CLS unchanged`;
  } else if(node.type==='bias'){
    hint.textContent=`block ${node.block+1} ôñ bias shift (no attention)`;
  } else if(node.type==='input'){ hint.textContent='input image (16 patches + CLS)'; }
  else hint.textContent='';
}

/* ---------- prediction bars ---------- */
function renderProbs(){
  const wrap=document.getElementById('probs'); wrap.innerHTML='';
  const p=state.res.probs, pred=state.res.pred, lab=DATA.examples[state.ex].label;
  p.forEach((v,i)=>{
    const d=document.createElement('div'); d.className='pbar';
    d.innerHTML=`<div class="bar" style="height:${4+v*46}px;background:${CC[i]};opacity:${i===pred?1:.45}"></div><div class="cap">${i}</div>`;
    wrap.appendChild(d);
  });
  const ph=document.getElementById('predHint');
  ph.innerHTML = `prediction <b style="color:${CC[pred]}">${pred}</b> (${(p[pred]*100).toFixed(1)}%) ôñ true ${lab} `
    + (pred===lab?'ã':'<span style="color:#f78154">ã misclassified</span>');
}

/* ---------- step / highlight ---------- */
function renderHighlights(){
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('active'));
  document.getElementById('node_input').classList.remove('active');
  document.getElementById('node_output').classList.remove('active');
  const n=state.res.nodes[state.step];
  if(n.type==='head') document.getElementById(`cell_${n.block}_${n.head}`).classList.add('active');
  else if(n.type==='input') document.getElementById('node_input').classList.add('active');
  if(state.step===state.res.nodes.length-1) document.getElementById('node_output').classList.add('active');
  document.getElementById('stepLabel').textContent=n.label;
}
function renderAll(fit){ render3D(fit); renderImage(); renderProbs(); renderHighlights();
  document.getElementById('back').disabled=state.step<=0;
  document.getElementById('fwd').disabled=state.step>=state.res.nodes.length-1;
}

/* ---------- controls ---------- */
function setStep(s){ state.step=Math.max(0,Math.min(state.res.nodes.length-1,s)); renderAll(false); }
document.getElementById('back').onclick=()=>{stopPlay();setStep(state.step-1);};
document.getElementById('fwd').onclick=()=>{stopPlay();setStep(state.step+1);};
document.getElementById('resetOff').onclick=()=>{state.off.clear();buildEncoder();recompute(true);};
function stopPlay(){state.playing=false;clearInterval(state.timer);document.getElementById('play').textContent='ãÑ play';}
document.getElementById('play').onclick=()=>{
  if(state.playing){stopPlay();return;}
  if(state.step>=state.res.nodes.length-1) state.step=0;
  state.playing=true;document.getElementById('play').textContent='ãã pause';
  const tick=()=>{ if(state.step>=state.res.nodes.length-1){stopPlay();return;} setStep(state.step+1); };
  const speed=+document.getElementById('speed').value;
  state.timer=setInterval(tick,speed);
};
document.getElementById('speed').oninput=()=>{ if(state.playing){stopPlay();document.getElementById('play').click();} };

/* ---------- init ---------- */
buildEncoder();
recompute(true);
window.addEventListener('resize',()=>render3D(false));
</script>
</body>
</html>
